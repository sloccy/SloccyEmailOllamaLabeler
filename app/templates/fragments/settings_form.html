<form id="settings-form" hx-patch="/fragments/settings" hx-target="#settings-form" hx-swap="outerHTML">
  <div class="card">
    <div class="card-body p-0">
      <div class="d-flex align-items-center justify-content-between py-3 px-4 border-bottom">
        <div><div class="fw-medium">Poll interval</div><div class="small text-body-secondary mt-1">How often to scan for new emails (seconds). Minimum 30.</div></div>
        <div class="flex-shrink-0 ms-4"><input type="number" class="form-control form-control-sm" name="poll_interval" min="30" step="30" value="{{ poll_interval }}" style="width:100px;text-align:right;"></div>
      </div>
      <div class="d-flex align-items-center justify-content-between py-3 px-4 border-bottom">
        <div><div class="fw-medium">Ollama model</div><div class="small text-body-secondary mt-1">Set via OLLAMA_MODEL in docker-compose.yml</div></div>
        <div class="flex-shrink-0 ms-4"><span class="badge text-bg-primary border border-primary-subtle font-monospace">{{ ollama_model }}</span></div>
      </div>
      <div class="d-flex align-items-center justify-content-between py-3 px-4">
        <div><div class="fw-medium">Ollama host</div><div class="small text-body-secondary mt-1">Set via OLLAMA_HOST in docker-compose.yml</div></div>
        <div class="flex-shrink-0 ms-4"><span class="badge text-bg-primary border border-primary-subtle font-monospace">{{ ollama_host }}</span></div>
      </div>
    </div>
  </div>
  <div class="mt-3">
    <button type="submit" class="btn btn-primary btn-sm">Save Changes</button>
  </div>
</form>
