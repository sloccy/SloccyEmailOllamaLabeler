<div class="row g-3 mb-4">
  <div class="col"><div class="card stat stat-blue"><div class="card-body p-3"><div class="text-uppercase small text-body-secondary mb-2" style="letter-spacing:0.09em;">Accounts</div><div class="font-monospace fs-4 fw-medium accent">{{ accounts|length }}</div></div></div></div>
  <div class="col"><div class="card stat stat-green"><div class="card-body p-3"><div class="text-uppercase small text-body-secondary mb-2" style="letter-spacing:0.09em;">Active Prompts</div><div class="font-monospace fs-4 fw-medium accent">{{ active_prompts }}</div></div></div></div>
  <div class="col"><div class="card stat stat-muted"><div class="card-body p-3"><div class="text-uppercase small text-body-secondary mb-2" style="letter-spacing:0.09em;">Poll Interval</div><div class="font-monospace fs-4 fw-medium">{{ poll_interval }}</div></div></div></div>
  <div class="col"><div class="card stat stat-green"><div class="card-body p-3"><div class="text-uppercase small text-body-secondary mb-2" style="letter-spacing:0.09em;">Next Scan</div><div class="font-monospace fs-4 fw-medium green">{{ next_scan }}</div></div></div></div>
</div>
<script>
  (function(){
    var dot = document.getElementById('pollerDot');
    var lbl = document.getElementById('pollerLabel');
    {% if poller_running %}
    dot.classList.add('active'); lbl.textContent = 'running';
    {% else %}
    dot.classList.remove('active'); lbl.textContent = 'stopped';
    {% endif %}
  })();
</script>
<h6 class="text-uppercase text-body-secondary small fw-semibold border-bottom pb-2 mb-3">Recent Activity</h6>
