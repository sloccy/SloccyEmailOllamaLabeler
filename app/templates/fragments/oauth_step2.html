<div class="flex-grow-1">
  <div class="fw-medium mb-2">Open the link and approve access</div>
  <div class="small text-body-secondary mb-2 lh-lg">Open the link below in your browser. After approving, your browser will try to open a page that fails to load — that is expected.</div>
  <div class="url-box visible font-monospace small bg-body-secondary border rounded p-2 text-primary mb-2" data-url="{{ auth_url|e }}">{{ auth_url|e }}</div>
  <button class="btn btn-outline-secondary btn-sm" onclick="copyAuthUrl(this)">Copy Link</button>
</div>
