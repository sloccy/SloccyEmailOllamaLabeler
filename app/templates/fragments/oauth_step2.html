<div class="u-flex-grow">
  <div class="font-medium u-mb-2">Open the link and approve access</div>
  <div class="text-sm u-text-muted u-mb-2 u-leading-relaxed">Open the link below in your browser. After approving, your browser will try to open a page that fails to load — that is expected.</div>
  <div class="url-box visible font-mono text-sm bg-base-200 border rounded u-p-2 text-primary u-mb-2" data-url="{{ auth_url|e }}">{{ auth_url|e }}</div>
  <button class="button is-outlined is-info is-small" onclick="copyAuthUrl(this)">Copy Link</button>
</div>
